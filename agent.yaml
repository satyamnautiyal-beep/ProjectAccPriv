orchestrator:
  agent_list:
    - agent_name : "New Enrollment Intake Orchestrator"

super_agents:
  - agent_class: FlowSuperAgent
    agent_name: "New Enrollment Intake Orchestrator"
    agent_description: "Top-level orchestrator for member intake, handling both OEP and SEP lifecycles."
    config:
      goal: "Process new enrollments, ensuring document verification for SEP cases."
      agent_list:
        - agent_name: "Enrollment Triage Agent"
          next_step:
            - "SEP Validation Sub-Agent"
            - "OEP Standard Agent"

        - agent_name: "SEP Validation Sub-Agent"
          agent_class: FlowSuperAgent # Nested super agent for modular flow
          config:
            agent_list:
              - agent_name: "GCP Document Retrieval Agent"
                next_step: ["Doc Analysis Agent"]
              - agent_name: "Doc Analysis Agent"
                next_step: ["Compliance Decision Agent"]
              - agent_name: "Compliance Decision Agent"

        - agent_name: "OEP Standard Agent"
          next_step: ["Completion Agent"]

        - agent_name: "Completion Agent"

utility_agents:
  - agent_class: CustomAgent
    agent_name: "Enrollment Triage Agent"
    agent_description: "Routes cases based on enrollment period dates."

  - agent_class: CustomAgent
    agent_name: "GCP Document Retrieval Agent"
    agent_description: "Fetches supporting PDFs from Google Cloud Storage."

  - agent_class: CustomAgent
    agent_name: "Doc Analysis Agent"
    agent_description: "Summarizes and extracts event details from documents via Vision/DocAI."

  - agent_class: AuthorAgent
    agent_name: "Compliance Decision Agent"
    agent_description: "Compares document summaries against EDI reason codes."

  - agent_class: CustomAgent
    agent_name: "OEP Standard Agent"
    agent_description: "Processes standard OEP intake."

  - agent_class: CustomAgent
    agent_name: "Completion Agent"
    agent_description: "Finalizes the member record and triggers downstream systems."